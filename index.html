<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Com-Store</title>
    <link rel="stylesheet" href="src/styles/e-com-store.css">
    <script>
        function bodyload() {
            loadCategory();
            loadProduct("data/e-com-store.json"); 
        }
        function loadProduct(jsonFile){
            document.querySelector("tbody").innerHTML = "";
            fetch(jsonFile)
                .then(function (res) {
                    return res.json();
                })
                .then(function (product) {
                    product.map(function (item) {
                        var tr = document.createElement("tr");

                        tr.innerHTML = `
                       
                        <td class="title">${item.title.toLocaleUpperCase()}</td>
                        <td>
                            <span class="price">Price :- </span>
                            <span class="pricetag">  &#8377; ${item.price}</span>
                        </td>
                        <!-- <td>${item.category}</td> -->
                        <td><img src=${item.image} width="100" height="100"></td>
                        <td><button>Add To Cart</button></td>
                    `;
                        document.querySelector("tbody").appendChild(tr);

                    })
                })

        }
        function loadCategory(){
                fetch("data/category.json")
                .then(function(res){
                    return res.json();
                })
                .then(function(category){
                    category.unshift("all");
                    category.map(function(cat){
                        var option = document.createElement("option");
                          //  option.text = cat.toLocaleUpperCase();
                          option.text = cat.charAt(0).toLocaleUpperCase() + cat.slice(1);
                            option.value = cat;
                        document.getElementById("lstCategory").appendChild(option);
                    })
                })
        }

        function ChangeCategory(){
           
            var categoryName = document.getElementById("lstCategory").value;
          // console.log(categoryName);
          if(categoryName == "all"){
            loadProduct("data/e-com-store.json");
          }else{
            loadProduct(`data/${categoryName}.json`);
          }
        }


    </script>
</head>

<body onload="bodyload()">
    <header>
        <div class="logo">YourShop</div>
        <div class="category">
            <select id="lstCategory" onchange="ChangeCategory()">
              
            </select>
        </div>
    </header>

    <h1 align="center">Fetch Data From Json File</h1>
    <table  width="100%">
        <thead>
            <tr>
                
                <th>Product Title</th>
                <th>Product Price</th>
                <!-- <th>Category</th> -->
                <th>Image</th>
                <th>       </th>
            </tr>
        </thead>
        <tbody style="text-align: center;">

        </tbody>
        <img src="public/images/jeans/j1.jpg">
    </table>
</body>

</html>
